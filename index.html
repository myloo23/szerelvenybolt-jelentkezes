<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Szerelvénybolt termékkártya</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <section class="product-card">
        <div class="product-image">
          <span class="product-badge">Készleten</span>
          <img src="assets/szerelvenyboltkft.jpg" alt="Kondenzációs kazán" />
        </div>

        <div class="product-content">
          <p class="product-category">Fűtéstechnika</p>
          <h1 class="product-title">Bosch kondenzációs kazán</h1>

          <p class="product-description">
            Modern, energiatakarékos kondenzációs kazán családi házak és lakások
            fűtési rendszeréhez.
          </p>

          <div class="product-info">
            <div>
              <span class="info-label">Ár</span>
              <strong>300 000 Ft</strong>
            </div>
            <div>
              <span class="info-label">Készlet</span>
              <strong>8 db</strong>
            </div>
          </div>

          <button class="cart-button">Kosárba</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
